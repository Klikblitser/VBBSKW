<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>To Save Earth, Imagine Mars</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Bebas+Neue&family=Cinzel:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #111;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: clamp(8px, 3vw, 40px);
  }

  .cover {
    position: relative;
    width: min(700px, 100%);
    aspect-ratio: 700 / 1045;
    overflow: hidden;
    background: #000;
    container-type: inline-size;
  }

  /* Achtergrondfoto: <img> werkt betrouwbaar via file://; CSS background-image vaak niet */
  .photo-bg {
    position: absolute;
    top: -1.91%;
    left: 0;
    width: 100%;
    height: 84.5%;
    z-index: 0;
    object-fit: cover;
    object-position: center bottom;
    opacity: 0.70;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }

  .overlay {
    position: absolute;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    background: linear-gradient(
      to bottom,
      rgba(0,0,0,0.25) 0%,
      rgba(0,0,0,0.45) 30%,
      rgba(0,0,0,0.65) 55%,
      rgba(0,0,0,0.85) 75%,
      rgba(0,0,0,0.95) 100%
    );
  }

  .content {
    position: absolute;
    inset: 0;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: 1.7cqw 8.6cqw 4.4cqw;
    text-align: center;
  }

  .top-text {
    font-family: 'Cinzel', serif;
    font-size: 1.7cqw;
    letter-spacing: 0.38em;
    color: #c8a068;
    text-transform: uppercase;
  }

  .title-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 0;
  }

  .to-save {
    font-family: 'Cinzel', serif;
    font-size: 3.4cqw;
    letter-spacing: 0.38em;
    color: #ddf0ff;
    text-transform: uppercase;
    margin-bottom: 0.3cqw;
  }

  .imagine {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 15.4cqw;
    letter-spacing: 0.08em;
    color: #6c95b5;
    line-height: 0.88;
    text-shadow: 0 2px 40px rgba(0,0,0,0.9);
  }

  .mars {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22.8cqw;
    letter-spacing: 0.10em;
    color: #c8622a;
    line-height: 0.88;
    text-shadow: 0 2px 40px rgba(0,0,0,0.9);
  }

  .rule {
    width: 25.7cqw;
    height: 1px;
    background: linear-gradient(to right, transparent, #c8a068, transparent);
    margin: 2.3cqw 0;
  }

  .subtitle {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 2.1cqw;
    line-height: 1.75;
    color: #ddf0ff;
    letter-spacing: 0.04em;
    max-width: 60cqw;
    text-shadow: 0 1px 10px rgba(0,0,0,0.95);
  }

  .bottom {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.4cqw;
  }

  .bottom-rule {
    width: 20cqw;
    height: max(1px, 0.20cqw);
    background: linear-gradient(to right, transparent, #c8a068, transparent);
  }

  .org {
    font-family: 'Cinzel', serif;
    font-size: 1.6cqw;
    letter-spacing: 0.55em;
    color: #a89070;
    text-transform: uppercase;

  }@media print {
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #000;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
    body {
      display: block;
    }
    .cover {
      width: 100%;
      height: 100vh;
      aspect-ratio: unset;
      page-break-after: avoid;
      break-after: avoid;
    }
  }
</style>
</head>
<body>
<div class="cover">
  <img
    class="photo-bg"
    src="Aardemars_gradient.png"
    alt="Aarde en Mars"
    onerror="if(!this.dataset.fallback){this.dataset.fallback='1';this.src='https://www.vbbskw.com/Aardemars_gradient.png';}">
  <div class="overlay"></div>
  <div class="content">
    <div class="top-text">V B B S K W &nbsp;&middot;&nbsp; Publication</div>
    <div class="title-block">
      <div class="to-save"><b>To save Earth,</b></div>
      <div class="imagine">Imagine</div>
      <div class="mars">Mars</div>
      <div class="rule"></div>
      <div class="subtitle">Why we shouldn&apos;t colonize Mars, <br>but invest the resources in a livable Earth instead <br>(and why a younger generation&apos;s &lsquo;Martian Constitution&rsquo; matters)</div>
    </div>
    <div class="bottom">
      <div class="bottom-rule"></div>
      <div class="org">R.G.C. Hoek</div>
    </div>
  </div>
</div>
</body>
</html>
