<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>To Save Earth, Imagine Mars</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Bebas+Neue&family=Cinzel:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #111;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: clamp(8px, 3vw, 40px);
  }

  .cover {
    position: relative;
    width: min(700px, 100%);
    aspect-ratio: 700 / 1045;
    overflow: hidden;
    background: #000;
    container-type: inline-size;
  }

  /* top en height als % van cover HEIGHT (containing block):
     foto hoogte = 84.5% van cover hoogte
     top = -1.91% van cover hoogte */
  .photo {
    position: absolute;
    top: -1.91%;
    left: 0;
    width: 100%;
    height: 84.5%;
    object-fit: cover;
    object-position: center center;
    opacity: 0.60;
  }

  .overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to bottom,
      rgba(0,0,0,0.00) 0%,
      rgba(0,0,0,0.20) 30%,
      rgba(0,0,0,0.45) 55%,
      rgba(0,0,0,0.75) 75%,
      rgba(0,0,0,0.85) 100%
    );
  }

  .content {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: 1.7cqw 8.6cqw 4.4cqw;
    text-align: center;
  }

  .top-text {
    font-family: 'Cinzel', serif;
    font-size: 1.7cqw;
    letter-spacing: 0.38em;
    color: #c8a068;
    text-transform: uppercase;
  }

  .title-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 0;
  }

  .to-save {
    font-family: 'Cinzel', serif;
    font-size: 3.4cqw;
    letter-spacing: 0.38em;
    color: #d4b890;
    text-transform: uppercase;
    margin-bottom: 0.3cqw;
  }

  .imagine {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 15.4cqw;
    letter-spacing: 0.08em;
    color: #62729c;
    line-height: 0.88;
    text-shadow: 0 2px 40px rgba(0,0,0,0.9);
  }

  .mars {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22.8cqw;
    letter-spacing: 0.10em;
    color: #c8622a;
    line-height: 0.88;
    text-shadow: 0 2px 40px rgba(0,0,0,0.9);
  }

  .rule {
    width: 25.7cqw;
    height: 1px;
    background: linear-gradient(to right, transparent, #c8a068, transparent);
    margin: 2.3cqw 0;
  }

  .subtitle {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 2.1cqw;
    line-height: 1.75;
    color: #d4cabb;
    letter-spacing: 0.04em;
    max-width: 60cqw;
    text-shadow: 0 1px 10px rgba(0,0,0,0.95);
  }

  .bottom {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.4cqw;
  }

  .bottom-rule {
    width: 20cqw;
    height: 1px;
    background: linear-gradient(to right, transparent, #c8a068, transparent);
  }

  .org {
    font-family: 'Cinzel', serif;
    font-size: 1.6cqw;
    letter-spacing: 0.55em;
    color: #a89070;
    text-transform: uppercase;

  }@media print {
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #000;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
    body {
      display: block;
    }
    .cover {
      width: 100%;
      height: 100vh;
      aspect-ratio: unset;
      page-break-after: avoid;
      break-after: avoid;
    }
  }
</style>
</head>
