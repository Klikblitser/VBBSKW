<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flyer voor lezing burgerberaden</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Bebas+Neue&family=Cinzel:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #ffffff;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: clamp(8px, 3vw, 40px);
  }

  .cover {
    position: relative;
    width: min(700px, 100%);
    aspect-ratio: 700 / 1045;
    overflow: hidden;
    background: #ffffff;
    container-type: inline-size;
  }

  /* Achtergrondfoto: <img> werkt betrouwbaar via file://; CSS background-image vaak niet */
  .photo-bg {
    position: absolute;
    top: -1.91%;
    left: 0;
    width: 100%;
    height: 84.5%;
    z-index: 0;
    object-fit: cover;
    object-position: center bottom;
    opacity: 1.0;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }

  .content {
    position: absolute;
    inset: 0;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: 1.7cqw 8.6cqw 4.4cqw;
    text-align: center;
  }

  .top-text {
    font-family: 'Cinzel', serif;
    font-size: 1.7cqw;
    letter-spacing: 0.38em;
    color: #ffffff;
    text-transform: uppercase;
  }

  .title-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 0;
  }

  .to-save {
    font-family: 'Cinzel', serif;
    font-size: 2.5cqw;
    letter-spacing: 0.38em;
    color: #000000;
    text-transform: uppercase;
    margin-bottom: 0.3cqw;
  }

  .imagine {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 14.4cqw;
    letter-spacing: 0.08em;
    color: #0072b9;
    line-height: 0.88;
    text-shadow: 0 2px 40px rgba(0,0,0,0.9);
  }

  .mars {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32.8cqw;
    letter-spacing: 0.10em;
    color: #000c68;
    line-height: 0.88;
    text-shadow: 0 2px 40px rgba(0,0,0,0.9);
  }

  .rule {
    width: 25.7cqw;
    height: 1px;
    background: linear-gradient(to right, transparent, #004d6e, transparent);
    margin: 2.3cqw 0;
  }

  .subtitle {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 2.8cqw;
    line-height: 1.75;
    color: #000000;
    letter-spacing: 0.04em;
    max-width: 60cqw;
    text-shadow: 0 1px 10px rgba(0,0,0,0.95);
  }

  .bottom {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.4cqw;
  }

  .bottom-rule {
    width: 20cqw;
    height: max(1px, 0.20cqw);
    background: linear-gradient(to right, transparent, #c8a068, transparent);
  }

  .org {
    font-family: 'Cinzel', serif;
    font-size: 3.6cqw;
    letter-spacing: 0.55em;
    color: #005194;
    text-transform: uppercase;

  }@media print {
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #ffffff;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
    body {
      display: block;
    }
    .cover {
      width: 100%;
      height: 100vh;
      aspect-ratio: unset;
      page-break-after: avoid;
      break-after: avoid;
    }
  }
</style>
</head>
<body>
<div class="cover">
  <img
    class="photo-bg"
    src="Aardemarsinverted.png"
    alt="Aarde en Mars"
    onerror="if(!this.dataset.fallback){this.dataset.fallback='1';this.src='https://www.vbbskw.com/Aardemarsinverted.png';}">
  <div class="overlay"></div>
  <div class="content">
    <div class="top-text">Een &nbsp;&middot;&nbsp; VBBSKW &nbsp;&middot;&nbsp; Initiatief</div>
    <div class="title-block">
      <div class="to-save"><b><br><br>Om de democratie te redden,</b></div>
      <div class="imagine">Beginnen we</div>
      <div class="mars">KLEIN</div>
      <div class="rule"></div>
      <div class="subtitle">Hoe Burgerberaden polarisatie tegengaan, <br> de stem van de burger échte legitimiteit geeft,<br> en een mandaat waardig is</div>
    </div>
    <div class="bottom">
      <div class="bottom-rule"></div>
      <div class="org">Spreker: <br> R.G.C. Hoek</div>
    </div>
  </div>
</div>
</body>
</html>
